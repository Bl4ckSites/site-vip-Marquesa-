<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Marquesa Ruiva</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- TELA INICIAL -->
    <div id="landing-page" class="container">
        <div class="grain-overlay"></div>
        
        <div class="profile-section">
            <div class="profile-circle">
                <img src="profile.avif" alt="Profile" id="profile-img">
            </div>
            
            <h1 class="title">Marquesa Ruiva</h1>
            <p class="username">@marquesaruiva</p>
            
            <div class="rating">
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="rating-text">5/5</span>
            </div>
            
            <p class="welcome-text">Como posso te servir hoje?</p>
            
            <button class="cta-button" onclick="openModal()">
                <span class="button-icon">✈</span>
                VEM ME VER
            </button>
        </div>
        
        <footer class="footer">
            <p>&copy; 2026</p>
        </footer>
    </div>

    <!-- MODAL DE VERIFICAÇÃO -->
    <div id="verification-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">VOCÊ É HUMANO?</h2>
            <p class="modal-subtitle">Deslize para ver meus conteúdos</p>
            
            <div class="slider-container">
                <div class="slider-track" id="slider-track">
                    <div class="slider-button" id="slider-button">
                        <span class="heart-icon">♥</span>
                        <img src="profile.avif" alt="Profile" class="profile-reveal hidden" id="profile-reveal">
                    </div>
                </div>
                <p class="slider-instruction">ARRASTE PARA A DIREITA →</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
