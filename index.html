<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Marquesa Ruiva - VIP ACCESS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">



<link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
<link rel="shortcut icon" href="/favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="Marquesa" />
<link rel="manifest" href="/favicon/site.webmanifest" />



</head>
<body>
    <div class="container" id="landing-page">
        <div class="grain-overlay"></div>
        
        <div class="profile-header animate-fade-down">
            <div class="profile-circle large animate-pulse-glow">
                <img src="profile1.avif" alt="Profile">
            </div>
            
            <h1 class="title">Marquesa Ruiva</h1>
            <p class="username">@marquesaruiva</p>
            
            <div class="rating animate-stars">
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="star">★</span>
                <span class="rating-text">5/5</span>
            </div>
            
            <p class="welcome-text">Como posso te servir hoje?</p>
            
            <button class="cta-button" onclick="openModal()">
                <span class="button-icon">✈</span>
                VEM ME VER
            </button>
        </div>
        
        <footer class="footer">
            <p>&copy; 2026</p>
        </footer>
    </div>

    <!-- MODAL DE VERIFICAÇÃO -->
    <div id="verification-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">VOCÊ É HUMANO?</h2>
            <p class="modal-subtitle">Deslize para ver meus conteúdos</p>
            
            <div class="slider-container">
                <div class="slider-track" id="slider-track">
                    <div class="slider-button" id="slider-button">
                        <span class="heart-icon">♥</span>
                        <img src="perfil.jpg" alt="Profile" class="profile-reveal hidden" id="profile-reveal">
                    </div>
                </div>
                <p class="slider-instruction">ARRASTE PARA A DIREITA →</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
