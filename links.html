            <p class="description">

    <script>
        // CHAVE SECRETA (MESMA DO script.js)
        const SECRET_KEY = 'minha_chave_secreta_2026_mude_isso';

        // VALIDAR TOKEN
        function validateToken(token) {
            try {
                const decoded = atob(token);
                const parts = decoded.split(':');
                if (parts.length !== 2) return false;
                
                const timestamp = parseInt(parts[0]);
                const now = Date.now();
                
                // Token válido por 24 horas
                return (now - timestamp) < (24 * 60 * 60 * 1000);
            } catch (e) {
                return false;
            }
        }

        // VERIFICAR ACESSO
        function checkAccess() {
            // Pegar token da URL ou sessionStorage
            const urlParams = new URLSearchParams(window.location.search);
            const urlToken = urlParams.get('t');
            const sessionToken = sessionStorage.getItem('authToken');
            
            const token = urlToken || sessionToken;
            
            if (!token || !validateToken(token)) {
                console.warn('️ Token inválido ou ausente - Redirecionando');
                window.location.href = 'index.html';
                return false;
            }
            
            console.log('✅ Token válido - Acesso permitido');
            return true;
        }

        // LINKS OFUSCADOS (Base64)
        function getLinks() {
            const encodedLinks = [
                {
                    icon: '🍊',

                    class: 'privacy-btn'
                },
                {
                    icon: '',
                    title: 'Canal VIP 🔞',
                    subtitle: 'Conteúdo exclusivo no Telegram',
                    url: atob('aHR0cHM6Ly90Lm1lL21hcnF1ZXNhcnVpdmFib3Q='),
                    class: 'vip-btn'
                },
                {
                    icon: '🔥',
                    title: 'Canal de prévias grátis',
                    subtitle: 'Conteúdo free',
                    url: atob('aHR0cHM6Ly90Lm1lLytJa3MzU2R1UEVNNFpUVXg='),
                    class: 'preview-btn'
                },
                {
                    icon: '📷',
                    title: 'Instagram',
                    subtitle: '@marquesaruiva',
                    url: atob('aHR0cHM6Ly93d3cuaW5zdGFncmFtLmNvbS9tYXJxdWVzYXJ1aXZhP2lnaD1lRE4wYTN5a2F6MGJ1ZUoyJnV0bV9zb3VyY2U9cXI='),
                    class: 'instagram-btn'
                },
                {
                    icon: '🐦',

                    subtitle: '@marquesaruiva88',
                    url: atob('aHR0cHM6Ly94LmNvbS9tYXJxdWVzYXJ1aXZhOD9zPTEx'),
                    class: 'twitter-btn'
                },
                {
                    icon: '🎵',
                    title: 'TikTok',
                    subtitle: '@marquesaruiva',
                    url: atob('aHR0cHM6Ly93d3cudGlrdG9rLmNvbS9AbWFycXVlc2FydWl2YT9fcj0xJl90PVpTLTlzWHVpT2lM'),
                    class: 'tiktok-btn'
                }
            ];
            
            return encodedLinks;
        }

        // RENDERIZAR LINKS
        function renderLinks() {
            const container = document.getElementById('links-container');
            const links = getLinks();
            
            links.forEach((link, index) => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                a.className = `link-button ${link.class} animate-slide-right`;
                a.style.animationDelay = `${index * 0.1}s`;
                
                a.innerHTML = `
                    <div class="button-content">
                        <span class="button-icon">${link.icon}</span>
                        <div class="button-text">
                            <strong>${link.title}</strong>
                            <span>${link.subtitle}</span>
                        </div>
                    </div>
                    <span class="arrow">→</span>
                `;
                
                container.appendChild(a);
            });
            
            console.log(`✅ ${links.length} links renderizados`);
        }

        // INICIALIZAR
        if (checkAccess()) {
            renderLinks();
        }
    </script>
</body>
</html>
